name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        run: cd web && pnpm install --frozen-lockfile && pnpm build

      - uses: astral-sh/setup-uv@v7

      - name: Build wheels
        run: |
          version="${GITHUB_REF_NAME#v}"
          uvx go-to-wheel . \
            --name tillr \
            --readme README.md \
            --description "Human-in-the-loop project management for agentic development" \
            --author "Matthew Schulkind" \
            --license Apache-2.0 \
            --url https://github.com/mschulkind-oss/tillr \
            --set-version-var github.com/mschulkind-oss/tillr/internal/version.Version \
            --version "$version"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish dist/* --check-url https://pypi.org/simple/
