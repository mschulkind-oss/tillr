version: 2

before:
  hooks:
    - go mod tidy
    # Build the embedded frontend before go vet / compilation.
    - sh -c "cd web && pnpm install --frozen-lockfile && pnpm build"
    - go vet ./...

builds:
  - main: ./cmd/tillr
    binary: tillr
    ldflags:
      - -s -w
      - -X github.com/mschulkind-oss/tillr/internal/version.Version={{.Version}}
      - -X github.com/mschulkind-oss/tillr/internal/version.GitCommit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: "tillr_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
